<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventures — Nicholas Georgiou</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

    <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream: #f5f0e8;
            --ink: #1a1a1a;
            --rust: #c94a2a;
            --gold: #D4A853;
            --muted: rgba(245,240,232,0.45);
        }

        html, body {
            width: 100%;
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            background: var(--ink);
            color: var(--cream);
            font-family: 'DM Mono', monospace;
            cursor: auto;
            overflow: hidden;
        }

        a { color: inherit; }

        .cursor {
            position: fixed;
            width: 12px;
            height: 12px;
            background: var(--rust);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
            mix-blend-mode: difference;
        }

        .cursor-ring {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid var(--cream);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: width 0.25s, height 0.25s, border-color 0.2s;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            padding: 22px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(245,240,232,0.08);
            background: rgba(26,26,26,0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .monogram {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--cream);
            letter-spacing: 0.12em;
            text-decoration: none;
        }

        .monogram em {
            color: var(--rust);
            font-style: normal;
        }

        nav.main-nav {
            display: flex;
            align-items: center;
        }

        nav.main-nav a {
            position: relative;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px;
            letter-spacing: 0.28em;
            color: var(--muted);
            text-decoration: none;
            padding: 10px 22px;
            transition: color 0.25s;
            text-transform: uppercase;
        }

        nav.main-nav a::before {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: var(--rust);
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        nav.main-nav a:hover,
        nav.main-nav a.active {
            color: var(--cream);
        }

        nav.main-nav a:hover::before,
        nav.main-nav a.active::before {
            width: calc(100% - 44px);
        }

        nav.main-nav a + a::after {
            content: '·';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translate(-50%, -50%);
            color: rgba(245,240,232,0.15);
            font-size: 16px;
            pointer-events: none;
        }

        #cesiumContainer {
            position: fixed;
            inset: 0;
            padding-top: 65px;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .cesium-infoBox,
        .cesium-viewer-infoBoxContainer {
            display: none !important;
        }

        .grain {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 50;
        }

        .overlay-panel {
            position: fixed;
            top: 118px;
            left: 40px;
            z-index: 120;
            max-width: 920px;
            pointer-events: none;
        }

        .hero-eyebrow {
            font-size: 10px;
            letter-spacing: 0.45em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(42px, 6vw, 86px);
            line-height: 0.92;
            letter-spacing: 0.03em;
            color: var(--cream);
            text-shadow: 0 3px 18px rgba(0,0,0,0.35);
        }

        .hero-title em {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.5em;
            color: var(--gold);
            display: block;
            letter-spacing: 0.02em;
            margin-top: 8px;
        }

        .hero-sub {
            margin-top: 18px;
            font-size: 12px;
            line-height: 1.9;
            color: rgba(245,240,232,0.72);
            max-width: 640px;
        }

        #filter-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: 22px;
            pointer-events: auto;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 18px;
            border-radius: 999px;
            border: 1px solid rgba(245,240,232,0.18);
            background: rgba(26,26,26,0.72);
            color: var(--cream);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: button;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .filter-btn:hover {
            border-color: rgba(212,168,83,0.5);
            background: rgba(245,240,232,0.08);
        }

        .filter-btn.active {
            border-color: rgba(212,168,83,0.7);
            background: rgba(212,168,83,0.18);
            color: var(--cream);
        }

        .filter-btn .btn-icon {
            font-size: 1rem;
            line-height: 1;
        }

        #adventure-modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #adventure-modal-bg.open {
            display: flex;
        }

        #adventure-modal {
            background: #111;
            border-radius: 16px;
            overflow-y: auto;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 80px rgba(0,0,0,0.7);
            animation: modalIn 0.28s ease;
            scroll-behavior: auto;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.94) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        #modal-carousel {
            width: 100%;
            position: relative;
            background: #000;
            flex-shrink: 0;
            overflow: hidden;
            transition: height 0.35s ease;
        }

        #carousel-track {
            display: flex;
            transition: transform 0.35s ease;
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 100%;
            position: relative;
        }

        .carousel-slide img {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal-badge {
            position: absolute;
            bottom: 16px;
            left: 18px;
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .modal-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6347;
            flex-shrink: 0;
        }

        .photo-date {
            position: absolute;
            bottom: 16px;
            right: 18px;
            color: rgba(255,255,255,1);
            font-size: 0.875rem;
            z-index: 10;
            font-style: italic;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            transition: background 0.2s;
            padding: 0;
        }

        .carousel-btn:hover { background: rgba(255,99,71,0.8); }
        #carousel-prev { left: 10px; }
        #carousel-next { right: 10px; }

        #carousel-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 3;
        }

        .carousel-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: background 0.2s;
        }

        .carousel-dot.active { background: #fff; }

        #modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 10;
            padding: 0;
        }

        #modal-close:hover { background: rgba(255, 99, 71, 0.85); }

        #photo-counter {
            position: absolute;
            top: 14px;
            left: 14px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 0.75rem;
            border-radius: 20px;
            padding: 4px 10px;
            z-index: 3;
            display: none;
        }

        #modal-body {
            padding: 20px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #111;
        }

        #modal-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #ff6347;
            line-height: 1.3;
        }

        #modal-desc {
            font-size: 0.92rem;
            line-height: 1.7;
            color: #bbb;
            font-style: italic;
            margin: 0;
        }

        @media (max-width: 700px) {
            .top-bar { 
                padding: 18px 20px; 
                gap: 12px;
            }
            .monogram { font-size: 18px; white-space: nowrap; flex-shrink: 0; }
            nav.main-nav a { 
                padding: 8px 8px; 
                font-size: 11px; 
                letter-spacing: 0.08em;
            }
            .overlay-panel {
                top: 80px;          /* ← just below the nav bar */
                left: 20px;
                right: 20px;
                max-width: none;
            }
            .hero-title {
                font-size: clamp(34px, 12vw, 64px);
            }

            html, body { cursor: auto; }
            .cursor, .cursor-ring { display: none; }
        }

        @media (max-width: 600px) {
            #adventure-modal { max-height: 95vh; }
        }
    </style>
</head>
<body>
    <div class="grain"></div>

    <div class="top-bar">
        <a class="monogram" href="index.html">Nicky-G<em>.</em></a>
        <nav class="main-nav">
            <a href="about.html">About</a>
            <a href="research.html">Research</a>
            <a href="projects.html">Projects</a>
            <a href="adventures.html" class="active">Adventures</a>
        </nav>
    </div>

    <div id="cesiumContainer"></div>

    <div class="overlay-panel">
        <div class="hero-title">
            <em>Interactive Trekkers Globe (ITR)</em>
        </div>
        <div id="filter-bar">
            <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">
                <span class="btn-icon">🌍</span> All Adventures
            </button>
            <button class="filter-btn" id="btn-golf" onclick="setFilter('golf')">
                <span class="btn-icon">⛳</span> Golf
            </button>
            <button class="filter-btn" id="btn-climbing" onclick="setFilter('climbing')">
                <span class="btn-icon">🧗</span> Climbing
            </button>
        </div>
    </div>

    <div id="adventure-modal-bg">
        <div id="adventure-modal">
            <div id="modal-carousel">
                <div id="carousel-track"></div>
                <span id="modal-badge" class="modal-badge"></span>
                <button id="carousel-prev" class="carousel-btn">&#8249;</button>
                <button id="carousel-next" class="carousel-btn">&#8250;</button>
                <div id="carousel-dots"></div>
                <span id="photo-counter"></span>
                <button id="modal-close" title="Close">&#x2715;</button>
            </div>
            <div id="modal-body">
                <h3 id="modal-title"></h3>
                <p id="modal-desc"></p>
            </div>
        </div>
    </div>

    <script>
        Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5MDU0MWJiOC00YWM1LTQwMDItODFiYS00YzMyNGIwMTc3OGIiLCJpZCI6NDEwMjMwLCJpYXQiOjE3NzQ2NDc4NjN9.2lHv7QJPf2mTxkkO-ymcjwTyX2RmohXUjwvKFM_nd_Y";

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrain: Cesium.Terrain.fromWorldTerrain(),
            infoBox: false,
            selectionIndicator: false,
            animation: false,
            timeline: false,
            geocoder: false,
            baseLayerPicker: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            fullscreenButton: false,
            shouldAnimate: true,
            fullscreenElement: 'cesiumContainer'
        });

        viewer.scene.globe.enableLighting = true;

        const adventures = [
            {
                title: "Miguel's Pizza Campsite",
                badge: "Red River Gorge, KY",
                category: "climbing",
                lat: 37.784021, lon: -83.681788,
                photos: [
                    { src: "Images/Miguels_05_2025.JPEG", date: "May 30, 2025" },
                    { src: "Images/Red_River_Gorge_05_2025/Nick_Finn_Posted_05_30_2025.jpg", date: "May 30, 2025" },
                ],
                description: "First outdoor climbing trip with the NASA homies. We are posted outside Miguel's Pizza and there is a good photo of Friday and Nimbus at the campsite behind the pizza parlor."
            },
            {
                title: "Base of Mount Rainier",
                badge: "Washington, USA",
                lat: 46.730453, lon: -121.832175,
                photos: [
                    { src: "Images/Rainier.JPEG", date: "" }
                ],
                description: "Sully and I snuck away from Seattle on Harpoon's last day of the internship. The Park Ranger really liked our toy dinosaurs."
            },
            {
                title: "Glacier National Park: Mt. Henry",
                badge: "Montana, USA",
                lat: 48.458218, lon: -113.344772,
                photos: [
                    { src: "Images/Glacier.JPEG", date: "Aug 13, 2024" },
                    { src: "Images/Glacier_6.JPEG", date: "Aug 13, 2024" },
                    { src: "Images/Glacier_4.JPEG", date: "Aug 13, 2024" },
                    { src: "Images/Glacier_5.JPEG", date: "Aug 13, 2024" },
                    { src: "Images/Glacier_3.JPEG", date: "Aug 13, 2024" }
                ],
                description: "Nimbus, Sully, and Harpoon take on Glacier National Park. 'How about that ride in. I guess that's why they call it sin city' - Alan Garner (The Hangover). Seriously though, the ride into Glacier was one for the ages. We started out zipping through desolate northern Montana approaching our campground blaring 'Ecstasy of Gold' because it just made sense. We set up Green Grommet with the first ever Timelapse! There is room for improvement, like camera positioning, but luckily it wasn't our last campsite. We gravitated towards Mt. Henry for some unknown reason (Harpoon and underlining ties). However it did not disappoint. One of the more vertical hikes we did, it was a real butt kicker. Saw a ton of goats, and luckily they were chillers. Took some funny panoramas at the top, and Harpoon accepted a job offer on top of Mt. Henry, what a funny place to do so. Seal team 3 descended right before sunset. Got back to camp, bought the craziest looking IPA cans known to man, and watched the sun go down over the lake. We later celebrated Harpoon's achievements with, you guessed it, SOUP NIGHT!!!"
            },
            {    
                title: "The Home Course",
                badge: "DuPont, WA",
                category: "golf",
                lat: 47.107046, lon: -122.663957,
                photos: [
                    { src: "Images/Golf/Home_Course.JPEG", date: "Jan 18, 2026" },
                    { src: "Images/Golf/Home_Course_2.JPEG", date: "Jan 18, 2026" }
                ],
                description: "First round of golf with Harpoon in Washington. This was the day after I moved to Washington, and the first time I ever beat Harpoon in a golf round. Must have let me win"
            },          
            {
                title: "Zion: Angels Landing",
                badge: "Utah, USA",
                lat: 37.269276, lon: -112.947854,
                photos: [
                    { src: "Images/AngelsLanding_08_19_2025.JPEG", date: "Aug 19, 2025" }
                ],
                description: "Angels Landing at dawn. Pretty sketchy at times (for Sully and Harpoon) but we crushed it. Saw a trail runner coming down as we were going up." 
            },
            {
                title: "Sudden Valley Golf Course",
                badge: "Bellingham, WA",
                category: "golf",
                lat: 48.713958, lon: -122.327216,
                photos: [
                    { src: "Images/Golf/Sudden_Valley.JPEG", date: "April 5, 2026" }
                ],
                description: "One of the wickedest drives up to a golf course. Harpoon and I decided to tip it out. What a difficult golf course. Memorable breakfeast sandwich and burrito at the turn, our guy behind the grill was serving." 
            },            
            {
                title: "Cape Cavo Greco",
                badge: "Cyprus",
                lat: 34.960319, lon: 34.084027,
                photos: [
                    { src: "Images/Cyprus_Fam.JPEG", date: "" }
                ],
                description: "Family roots and Mediterranean views. Cape Cavo Greco with Mom and Dad."
            },
            {
                title: "The Gorge Amphitheater: Bob Dylan Concert",
                badge: "Spokane, WA",
                lat: 47.099714, lon: -119.994275,
                photos: [
                    { src: "Images/Gorge.jpg", date: "Aug 10, 2024" },
                    { src: "Images/Gorge_2.JPEG", date: "Aug 10, 2024" }
                ],
                description: "Bob Dylan concert at the Gorge Amphitheater. Beautiful sunset and even better venue."
            },
            {
                title: "The Enchantments: Lake Colchuck",
                badge: "Leavenworth, WA",
                lat: 47.496330, lon: -120.832133,
                photos: [
                    { src: "Images/Colchuck.JPEG", date: "Aug 11, 2024" },
                    { src: "Images/Colchuck_2.JPEG", date: "Aug 11, 2024" },
                    { src: "Images/Colchuck_3.JPEG", date: "Aug 11, 2024" }
                ],
                description: "Fun day trip in Washington's Enchantments. Lake Colchuck does not disappoint."
            },
            {
                title: "Grand Teton: North Fork Cascade Canyon",
                badge: "Jenny Lake, WY",
                lat: 43.778026, lon: -110.826905,
                photos: [
                    { src: "Images/Teton_Rock.JPEG", date: "Aug 16, 2024" },
                    { src: "Images/Horse.JPEG", date: "Aug 16, 2024" },
                ],
                description: "The Tetons. Doesn't really need that Grand of an introduction (hahaha). The crew woke up at the crack of dawn and booked it down from our campsite in Yellowstone. Having absolutely no idea where we were going to be sleeping that night, we started the trek of 'Lake Solitude'. Started off behind a horse crew and got my favorite picture of the trip. The crews hiking chemistry was at an all time high, jokes were flowing, and parents were loving us! For every sports team merchandise we saw on the trial, we pretended to be fans. The people loved us. By far are longest hike of the trip, we were lucky enough to witness a moose AND some black bears off in the distance. Harpoon unfortunately was unable to give them a bear hug #niceshirt. We reached the lake and took it all in. Played some hacky with an incredible backdrop. Jumped in the water to cool off. We did some epic canon balls. Did our silly dances and headed back down. Harpoon snipped a campground at the last second. We shared some drinks and stories with our German neighbor we met. By golly did he have some tales. Watched the sunset at over the Tetons and hit the hay. What a day."
            },
            {
                title: "Zion: The Narrows",
                badge: "Springdale, UT",
                lat: 37.311619, lon: -112.928935,
                photos: [
                    { src: "Images/Narrows_08_19_2025.JPEG", date: "Aug 19, 2024" },
                    { src: "Images/Narrows_2.JPEG", date: "Aug 19, 2024" },
                ],
                description: "I swear the Narrows has no end. This one really tested our friendship."
            },
            {
                title: "Cyprus: Moutti tis Sotiras",
                badge: "Neo Chorio, Cyprus",
                lat: 35.064777, lon: 32.324798,
                photos: [
                    { src: "Images/Cyprus_Hike.JPEG", date: "May 24, 2023" }
                ],
                description: "Summit hike watching the sun set over the Mediterranean. Felicia and I had to manage the darkness on the way down, but was worth the sunset."
            },
            {
                title: "Cyprus: Wind Surfing",
                badge: "Pyla, Cyprus",
                lat: 34.978585, lon: 33.700373,
                photos: [
                    { src: "Images/Wind_Surfing.JPEG", date: "May 23, 2023" }
                ],
                description: "Marinos, Felicia, and I take on wind surfing in the Mediterranean."
            },
            {
                title: "Hampton: Night Out",
                badge: "Phoebus, VA",
                lat: 37.022382, lon: -76.313352,
                photos: [
                    { src: "Images/Hampton_4th.JPG", date: "July 3, 2025" }
                ],
                description: "NASA crew before karaoke at Slyde Clydes."
            },
            {
                title: "New York City: Central Park",
                badge: "New York, NY",
                lat: 40.782969, lon: -73.965355,
                photos: [
                    { src: "Images/NYC.JPEG", date: "July 27, 2025" }
                ],
                description: "Harpoon had work training in NYC so I flew in to visit. Grabbed this shot on a stroll in Central Park."
            },
            {
                title: "Eaglewood Golf Course",
                badge: "Hampton, VA",
                category: "golf",
                lat: 37.08707, lon: -76.36979,
                photos: [
                    { src: "Images/Golf/Eaglewood_Picker.JPEG", date: "July 6, 2024" }
                ],

                description: "Lunch with Yiayia and family at my dad's sister's house. My sister and cousin are pictured here."

        ];

        adventures.forEach(a => {
            if (!a.photos || a.photos.length === 0) {
                a.photos = [{ src: a.image || '', date: '' }];
            }
            if (!a.category) a.category = 'general';
        });

        let activeFilter = 'all';

        function setFilter(filter) {
            activeFilter = filter;
            document.getElementById('btn-all').classList.toggle('active', filter === 'all');
            document.getElementById('btn-golf').classList.toggle('active', filter === 'golf');
            document.getElementById('btn-climbing').classList.toggle('active', filter === 'climbing');

            viewer.entities.values.forEach(entity => {
                if (!entity.properties) return;
                const cat = entity.properties.category.getValue();
                entity.show = (filter === 'all') || (cat === filter);
            });
        }

        function makePhotoPinCanvas(imgSrc, accentColor, onReady) {
            const S = 80;
            const R = 28;
            const CX = S / 2;
            const CY = R + 4;
            const TIP_H = 10;

            function draw(photoImg) {
                const canvas = document.createElement('canvas');
                canvas.width = S;
                canvas.height = CY + R + TIP_H + 4;
                const ctx = canvas.getContext('2d');
                const totalH = canvas.height;

                ctx.beginPath();
                ctx.arc(CX + 1, CY + 2, R + 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.28)';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(CX, CY, R + 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(CX - 9, CY + R + 2);
                ctx.lineTo(CX + 9, CY + R + 2);
                ctx.lineTo(CX, totalH - 2);
                ctx.closePath();
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.save();
                ctx.beginPath();
                ctx.arc(CX, CY, R, 0, Math.PI * 2);
                ctx.clip();

                if (photoImg) {
                    ctx.drawImage(photoImg, CX - R, CY - R, R * 2, R * 2);
                } else {
                    ctx.fillStyle = accentColor;
                    ctx.fillRect(CX - R, CY - R, R * 2, R * 2);
                }

                ctx.restore();
                onReady(canvas);
            }

            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => draw(img);
            img.onerror = () => draw(null);
            img.src = imgSrc;
        }

        adventures.forEach(place => {
            const isInternational = !place.badge.includes('USA') && !place.badge.includes('KY') && !place.badge.includes('WA');
            const pinColor = place.category === 'golf' ? '#3a7d44'
                : isInternational ? '#f59e0b'
                : '#ff6347';
            const thumbSrc = place.photos[0].src;

            makePhotoPinCanvas(thumbSrc, pinColor, canvas => {
                viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(place.lon, place.lat, 0),
                    billboard: {
                        image: canvas,
                        width: canvas.width,
                        height: canvas.height,
                        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, 0),
                        disableDepthTestDistance: Number.POSITIVE_INFINITY,
                        scaleByDistance: new Cesium.NearFarScalar(1.5e6, 1.0, 2.5e7, 0.4),
                    },
                    name: place.title,
                    properties: new Cesium.PropertyBag({
                        badge: place.badge,
                        photos: JSON.stringify(place.photos),
                        description: place.description,
                        category: place.category
                    })
                });
            });
        });

        let carouselPhotos = [];
        let carouselIndex = 0;
        let slideAspectRatios = [];

        const modalBg = document.getElementById('adventure-modal-bg');
        const modalBadge = document.getElementById('modal-badge');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalClose = document.getElementById('modal-close');
        const carousel = document.getElementById('modal-carousel');
        const track = document.getElementById('carousel-track');
        const dotsWrap = document.getElementById('carousel-dots');
        const prevBtn = document.getElementById('carousel-prev');
        const nextBtn = document.getElementById('carousel-next');
        const counter = document.getElementById('photo-counter');

        function applyHeight(idx) {
            const ratio = slideAspectRatios[idx];
            if (ratio != null) {
                carousel.style.height = (carousel.offsetWidth * ratio) + 'px';
            }
        }

        function buildCarousel(photos) {
            carouselPhotos = photos;
            carouselIndex = 0;
            slideAspectRatios = new Array(photos.length).fill(null);

            track.innerHTML = '';
            dotsWrap.innerHTML = '';

            photos.forEach((p, i) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';

                const img = document.createElement('img');
                img.src = p.src;
                img.alt = '';

                function storeRatio() {
                    if (!img.naturalWidth) return;
                    slideAspectRatios[i] = img.naturalHeight / img.naturalWidth;
                    if (i === carouselIndex) applyHeight(i);
                }

                if (img.complete && img.naturalWidth) {
                    storeRatio();
                } else {
                    img.addEventListener('load', storeRatio, { once: true });
                }

                slide.appendChild(img);

                if (p.date) {
                    const dateEl = document.createElement('span');
                    dateEl.className = 'photo-date';
                    dateEl.textContent = p.date;
                    slide.appendChild(dateEl);
                }

                track.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => goTo(i));
                dotsWrap.appendChild(dot);
            });

            const multi = photos.length > 1;
            prevBtn.style.display = multi ? 'flex' : 'none';
            nextBtn.style.display = multi ? 'flex' : 'none';
            dotsWrap.style.display = multi ? 'flex' : 'none';
            counter.style.display = multi ? 'block' : 'none';

            updateCarousel();
        }

        function updateCarousel() {
            track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            dotsWrap.querySelectorAll('.carousel-dot')
                .forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
            counter.textContent = `${carouselIndex + 1} / ${carouselPhotos.length}`;
            applyHeight(carouselIndex);
        }

        function goTo(idx) {
            carouselIndex = (idx + carouselPhotos.length) % carouselPhotos.length;
            updateCarousel();
        }

        prevBtn.addEventListener('click', () => goTo(carouselIndex - 1));
        nextBtn.addEventListener('click', () => goTo(carouselIndex + 1));

        let touchStartX = 0;
        track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        track.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 40) goTo(carouselIndex + (dx < 0 ? 1 : -1));
        });

        function openModal(entity) {
            const props = entity.properties;
            modalTitle.textContent = entity.name;
            modalDesc.textContent = props.description.getValue();
            modalBadge.textContent = props.badge.getValue();

            modalBg.classList.add('open');
            document.body.style.overflow = 'hidden';

            const photos = JSON.parse(props.photos.getValue());
            buildCarousel(photos);

            const modal = document.getElementById('adventure-modal');
            const firstImg = track.querySelector('img');
            const scrollTop = () => { modal.scrollTop = 0; };

            if (firstImg && !firstImg.complete) {
                firstImg.addEventListener('load', scrollTop, { once: true });
            } else {
                scrollTop();
            }
        }

        function closeModal() {
            modalBg.classList.remove('open');
            document.body.style.overflow = '';
        }

        modalClose.addEventListener('click', closeModal);
        modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeModal(); return; }
            if (!modalBg.classList.contains('open')) return;
            if (e.key === 'ArrowLeft') goTo(carouselIndex - 1);
            if (e.key === 'ArrowRight') goTo(carouselIndex + 1);
        });

        viewer.screenSpaceEventHandler.setInputAction(function (click) {
            const picked = viewer.scene.pick(click.position);
            if (Cesium.defined(picked) && Cesium.defined(picked.id) && picked.id.properties) {
                openModal(picked.id);
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(-98.5, 39.8, 20000000)
        });

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
                ring.style.width = '60px';
                ring.style.height = '60px';
                ring.style.borderColor = 'var(--rust)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.width = '12px';
                cursor.style.height = '12px';
                ring.style.width = '40px';
                ring.style.height = '40px';
                ring.style.borderColor = '';
            });
        });
    </script>
