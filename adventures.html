    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: url('Images/Panorama_3.JPEG') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 50px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 125px;
        }

        header h1 { font-size: 3rem; margin: 0; }

        section {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        section h2 { text-align: center; margin-bottom: 10px; }

        .click-hint {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            font-style: italic;
            margin-bottom: 24px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #333;
            color: white;
        }

        /* ── Centered full-width map ── */
        #cesiumContainer {
            width: 100%;
            height: 550px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
        }

        /* ── Modal overlay ── */
        #adventure-modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #adventure-modal-bg.open {
            display: flex;
        }

        #adventure-modal {
            background: #111;
            border-radius: 16px;
            overflow-y: auto;
            width: 100%;
            max-width: 510px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            position: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.7);
            animation: modalIn 0.28s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.94) translateY(12px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Photo hero */
        #modal-img-wrap {
            width: 100%;
            position: relative;
            background: #000;
        }

        #modal-img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #modal-img.loaded { opacity: 1; }

        /* Bottom gradient for badge */
        #modal-img-wrap::after {
            content: '';
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 45%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.75));
            pointer-events: none;
        }

        .modal-badge {
            position: absolute;
            bottom: 16px;
            left: 18px;
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .modal-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6347;
            flex-shrink: 0;
        }

        #modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 10;
            padding: 0;
        }

        #modal-close:hover { background: rgba(255, 99, 71, 0.85); }

        /* Text body */
        #modal-body {
            padding: 20px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #111;
        }
        #modal-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #ff6347;
            line-height: 1.3;
        }

        #modal-desc {
            font-size: 0.92rem;
            line-height: 1.7;
            color: #bbb;
            font-style: italic;
            margin: 0;
        }

        /* Suppress Cesium built-in UI */
        .cesium-infoBox,
        .cesium-viewer-infoBoxContainer { display: none !important; }

        @media (max-width: 600px) {
            #modal-img-wrap { height: 260px; flex: 0 0 260px; }
        }
    </style>
</head>

    <footer>

    <script>
        Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5MDU0MWJiOC00YWM1LTQwMDItODFiYS00YzMyNGIwMTc3OGIiLCJpZCI6NDEwMjMwLCJpYXQiOjE3NzQ2NDc4NjN9.2lHv7QJPf2mTxkkO-ymcjwTyX2RmohXUjwvKFM_nd_Y";

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrain: Cesium.Terrain.fromWorldTerrain(),
            infoBox: false,
            selectionIndicator: false
        });

        const adventures = [
            {
                title: "Miguel's Pizza Campsite",
                badge: "Red River Gorge, KY",
                lat: 37.784021, lon: -83.681788,
                image: "Images/Red_River_Gorge_05_2025/Nick_Finn_Posted_05_30_2025.jpg",
                description: "First outdoor climbing trip with the NASA homies. Friday and Nimbus at the campsite behind the notorious Miguel's Pizza."
            },
            {
                title: "Base of Mount Rainier",
                badge: "Washington, USA",
                lat: 46.730453, lon: -121.832175,
                image: "Images/Rainier.JPEG",
                description: "Sully and I snuck away from Seattle on Harpoon's last day of the internship. The Park Ranger really liked our toy dinosaurs."
            },
            {
                title: "Mt. Henry: Glacier National Park",
                badge: "Montana, USA",
                lat: 48.7596, lon: -113.7870,
                image: "Images/Glacier.JPEG",
                description: "Summit hike with incredible views and a ton of Mountain Goats. Harpoon got a job offer too."
            },
            {
                title: "Grand Teton — Horse Trail",
                badge: "Wyoming, USA",
                lat: 43.776365, lon: -110.734261,
                image: "Images/Horse.JPEG",
                description: "One of my favorite shots ever. Caught behind some horse back riders on our way up to Lake Solitude."
            },
            {
                title: "Zion — Angels Landing",
                badge: "Utah, USA",
                lat: 37.269276, lon: -112.947854,
                image: "Images/AngelsLanding_08_19_2025.JPEG",
                description: "Angels Landing at 7:50 AM. Pretty sketchy at times, but we made great time."
            },
            {
                title: "Cyprus — Cape Cavo Greco",
                badge: "Cyprus",
                lat: 34.960319, lon: 34.084027,
                image: "Images/Cyprus_Fam.JPEG",
                description: "Family roots and Mediterranean views. Cape Cavo Greco with Mom and Dad."
            },
            {
                title: "The Gorge Amphitheater",
                badge: "Washington, USA",
                lat: 47.099714, lon: -119.994275,
                image: "Images/Gorge.jpg",
                description: "Bob Dylan concert at the Gorge Amphitheater. Beautiful sunset and even better venue."
            },
            {
                title: "Lake Colchuck",
                badge: "Washington, USA",
                lat: 47.496330, lon: -120.832133,
                image: "Images/Colchuck.JPEG",
                description: "Fun day trip in Washington's Enchantments. Lake Colchuck does not disappoint."
            },
            {
                title: "Grand Teton — North Fork Cascade Canyon",
                badge: "Wyoming, USA",
                lat: 43.778026, lon: -110.826905,
                image: "Images/Teton_Rock.JPEG",
                description: "Lake Solitude hike with the Tetons looming in the background."
            },
            {
                title: "Zion — The Narrows",
                badge: "Utah, USA",
                lat: 37.311619, lon: -112.928935,
                image: "Images/Narrows_08_19_2025.JPEG",
                description: "The Narrows just keeps going. A trail that really tested our friendship."
            },
            {
                title: "Cyprus — Moutti tis Sotiras",
                badge: "Cyprus",
                lat: 35.064777, lon: 32.324798,
                image: "Images/Cyprus_Hike.JPEG",
                description: "Summit hike watching the sun set over the Mediterranean."
            },
            {
                title: "Cyprus — Yiayia's Visit",
                badge: "Cyprus",
                lat: 34.693074, lon: 32.963319,
                image: "Images/Cyprus_yiayia.JPEG",
                description: "Lunch with Yiayia and family at my dad's sister's house."
            }
        ];

        /*
         * Photo-frame pin builder (Apple Maps style)
         * Loads the image then draws a circular photo inside
         * a white-bordered bubble with a small downward point.
         * Falls back to a colored dot if the image can't load.
         */
        function makePhotoPinCanvas(imgSrc, accentColor, onReady) {
            const S = 80;          // canvas size
            const R = 28;          // circle radius
            const CX = S / 2;
            const CY = R + 4;      // circle center (leave room for border at top)
            const TIP_H = 10;      // height of the downward triangle tip

            function draw(photoImg) {
                const canvas = document.createElement('canvas');
                canvas.width = S;
                canvas.height = CY + R + TIP_H + 4;
                const ctx = canvas.getContext('2d');

                const totalH = canvas.height;

                // Drop-shadow approximation via dark circle slightly offset
                ctx.beginPath();
                ctx.arc(CX + 1, CY + 2, R + 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.28)';
                ctx.fill();

                // White border ring
                ctx.beginPath();
                ctx.arc(CX, CY, R + 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                // Tip / pointer
                ctx.beginPath();
                ctx.moveTo(CX - 9, CY + R + 2);
                ctx.lineTo(CX + 9, CY + R + 2);
                ctx.lineTo(CX, totalH - 2);
                ctx.closePath();
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                // Clip to circle and draw photo (or fallback color)
                ctx.save();
                ctx.beginPath();
                ctx.arc(CX, CY, R, 0, Math.PI * 2);
                ctx.clip();

                if (photoImg) {
                    ctx.drawImage(photoImg, CX - R, CY - R, R * 2, R * 2);
                } else {
                    ctx.fillStyle = accentColor;
                    ctx.fillRect(CX - R, CY - R, R * 2, R * 2);
                }

                ctx.restore();

                onReady(canvas);
            }

            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => draw(img);
            img.onerror = () => draw(null);
            img.src = imgSrc;
        }

        adventures.forEach(place => {
            const isInternational = !place.badge.includes('USA') && !place.badge.includes('KY');
            const pinColor = isInternational ? '#f59e0b' : '#ff6347';

            makePhotoPinCanvas(place.image, pinColor, (canvas) => {
                const totalH = canvas.height;
                const entity = viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(place.lon, place.lat, 0),
                    billboard: {
                        image: canvas,
                        width: canvas.width,
                        height: totalH,
                        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, 0),
                        disableDepthTestDistance: Number.POSITIVE_INFINITY,
                        scaleByDistance: new Cesium.NearFarScalar(1.5e6, 1.0, 2.5e7, 0.4),
                    },
                    name: place.title,
                    properties: new Cesium.PropertyBag({
                        badge:       place.badge,
                        image:       place.image,
                        description: place.description
                    })
                });
            });
        });

        /* ── Modal logic ── */
        const modalBg   = document.getElementById('adventure-modal-bg');
        const modalImg  = document.getElementById('modal-img');
        const modalBadge = document.getElementById('modal-badge');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc  = document.getElementById('modal-desc');
        const modalClose = document.getElementById('modal-close');

        function openModal(entity) {
            const props = entity.properties;
            modalTitle.textContent = entity.name;
            modalDesc.textContent  = props.description.getValue();
            modalBadge.textContent = props.badge.getValue();

            modalImg.classList.remove('loaded');
            modalImg.src = '';
            modalImg.onload = () => {
                modalImg.classList.add('loaded');
                setTimeout(() => {
                    const modal = document.getElementById('adventure-modal');
                    modal.scrollTop = modal.scrollHeight / 2;
                }, 50);
            };
            modalImg.src = props.image.getValue();
            modalImg.alt = entity.name;

            modalBg.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalBg.classList.remove('open');
            document.body.style.overflow = '';
        }

        modalClose.addEventListener('click', closeModal);

        // Close on backdrop click
        modalBg.addEventListener('click', (e) => {
            if (e.target === modalBg) closeModal();
        });

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        viewer.screenSpaceEventHandler.setInputAction(function (click) {
            const picked = viewer.scene.pick(click.position);
            if (Cesium.defined(picked) && Cesium.defined(picked.id) && picked.id.properties) {
                openModal(picked.id);
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(-98.5, 39.8, 20000000)
        });
    </script>
</body>
