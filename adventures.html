<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventures | Nicholas Georgiou</title>
    <link rel="stylesheet" href="./StyleSheet.css">

    <!-- Cesium -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fdf6e3;
        }

        header {
            background: url('Images/Panorama_3.JPEG') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
        }

        header h2 {
            font-size: 1.5rem;
            font-weight: 300;
            margin-top: 10px;
        }

        section {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 🌍 Globe container */
        #cesiumContainer {
            width: 100%;
            height: 600px;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #333;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Adventure Map</h1>
        <h2>Pins from My Journey</h2>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="research.html">Research</a>
        <a href="projects.html">Projects</a>
        <a href="adventures.html">Adventures</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section>
        <h2>My Adventures</h2>
        <p>
            A collection of some of my favorite adventures—now mapped across the globe. 
            Click any location to explore photos and memories from each trip.
        </p>

        <!-- 🌍 Globe -->
        <div id="cesiumContainer"></div>
    </section>

    <footer>
        <p>&copy; 2024 Nicholas Georgiou. All rights reserved.</p>
    </footer>

    <script>
        // 🔑 Cesium Ion token
        Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5MDU0MWJiOC00YWM1LTQwMDItODFiYS00YzMyNGIwMTc3OGIiLCJpZCI6NDEwMjMwLCJpYXQiOjE3NzQ2NDc4NjN9.2lHv7QJPf2mTxkkO-ymcjwTyX2RmohXUjwvKFM_nd_Y";

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrain: Cesium.Terrain.fromWorldTerrain()
        });

        // 📐 Panel dimensions
        viewer.infoBox.container.style.width      = "320px";
        viewer.infoBox.container.style.height     = "440px";
        viewer.infoBox.container.style.transition = "none";   // ← kill slide animation
        viewer.infoBox.container.style.animation  = "none";
        
        // Kill the sliding animation, the load event fires mid animation and causes weird resizing issues
        const infoBoxInner = viewer.infoBox.container.querySelector('.cesium-infoBox');
        if (infoBoxInner) {
            infoBoxInner.style.transition = "none";
            infoBoxInner.style.animation  = "none";
        }

        viewer.infoBox.frame.addEventListener('load', function () {
            const doc = viewer.infoBox.frame.contentDocument;
            if (!doc) return;

            viewer.infoBox.frame.style.width   = "100%";
            viewer.infoBox.frame.style.height  = "100%";
            viewer.infoBox.frame.style.display = "block";

            const style = doc.createElement('style');
            style.textContent = `
                html, body {
                    width: 320px !important;
                    min-width: 320px !important;
                    margin: 0;
                    padding: 0;
                    overflow-x: hidden;
                    background: #fdf6e3;
                }
                body {
                    padding: 14px;
                    font-family: Arial, sans-serif;
                    color: #333;
                    overflow-y: auto;
                }
                * { box-sizing: border-box; }
                h3 {
                    font-size: 1.1rem;
                    margin: 0 0 8px 0;
                    color: #b45309;
                    border-bottom: 2px solid #f59e42;
                    padding-bottom: 6px;
                }
                p {
                    font-size: 0.88rem;
                    line-height: 1.55;
                    margin: 8px 0 10px 0;
                    font-style: italic;
                    color: #555;
                }
                img {
                    width: 100% !important;
                    height: auto !important;
                    border-radius: 8px;
                    margin-top: 6px;
                    box-shadow: 0 3px 10px rgba(0,0,0,0.18);
                    display: block;
                }
            `;
            doc.head.appendChild(style);
        });

        // ─────────────────────────────────────────────
        // 🌍 Adventure Data
        // ─────────────────────────────────────────────
        const adventures = [
            {
                title: "Miguel's Pizza Campsite",
                lat: 37.784021,
                lon: -83.681788,
                image: "Images/Red_River_Gorge_05_2025/Nick_Finn_Posted_05_30_2025.jpg",
                description: "First outdoor climbing trip with the NASA homies. Friday and Nimbus at the campsite behind the notorious Miguel's Pizza."
            },
            {
                title: "Base of Mount Rainier",
                lat: 46.730453,
                lon: -121.832175,
                image: "Images/Rainier.JPEG",
                description: "Sully and I snuck away from Seattle on Harpoon's last day of the internship. The Park Ranger really liked our toy dinosaurs."
            },
            {
                title: "Mt. Henry: Glacier National Park",
                lat: 48.7596,
                lon: -113.7870,
                image: "Images/Glacier.JPEG",
                description: "Summit hike with incredible views and ton of Mountain Goats. Harpoon got a job offer too."
            },
            {
                title: "Grand Teton National Park — Horse Trail",
                lat: 43.776365,
                lon: -110.734261,
                image: "Images/Horse.JPEG",
                description: "One of my favorite shots ever. Caught behind some horse back riders on our way up to Lake Solitude"
            },
            {
                title: "Zion National Park — Angels Landing",
                lat: 37.269276,
                lon: -112.947854,
                image: "Images/AngelsLanding_08_19_2025.JPEG",
                description: "Angels Landing at 7:50 AM. Pretty sketchy at times, but we made great time."
            },
            {
                title: "Cyprus — Cape Cavo Greco",
                lat: 34.960319,
                lon: 34.084027,
                image: "Images/Cyprus_Fam.JPEG",
                description: "Family roots and Mediterranean views. Cape Cavo Greco with Mom and Dad."
            },
            {
                title: "The Gorge Amphitheater",
                lat: 47.099714,
                lon: -119.994275,
                image: "Images/Gorge.jpg",
                description: "Bob Dylan concert at the Gorge Amphitheater. Beautiful sunset and even better venue."
            },
            {
                title: "Lake Colchuck",
                lat: 47.496330,
                lon: -120.832133,
                image: "Images/Colchuck.JPEG",
                description: "Fun day trip in Washington's Enchantments. Lake Colchuck does not disappoint."
            },
            {
                title: "Grand Teton National Park - North Fork Cascade Canyon",
                lat: 43.778026,
                lon: -110.826905,
                image: "Images/Teton_Rock.JPEG",
                description: "Lake Solitude hike with the Tetons looming in the background."
            },
            {
                title: "Zion — The Narrows",
                lat: 37.311619,
                lon: -112.928935,
                image: "Images/Narrows_08_19_2025.JPEG",
                description: "The Narrows just keeps going. A trail that really tested our friendship."
            },
            {
                title: "Cyprus — Moutti tis Sotiras",
                lat: 35.064777,
                lon: 32.324798,
                image: "Images/Cyprus_Hike.JPEG",
                description: "Summit hike watching the sun set over the Mediterranean."
            },
            {
                title: "Cyprus — Yiayia's Visit",
                lat: 34.693074,
                lon: 32.963319,
                image: "Images/Cyprus_yiayia.JPEG",
                description: "Lunch with Yiayia and family at my dad's sister's house."
            }
        ];

        // ─────────────────────────────────────────────
        // 📍 Add pins — visible in both 2D and 3D
        // ─────────────────────────────────────────────
        adventures.forEach(place => {
            viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(place.lon, place.lat, 5000),
                billboard: {
                    image: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
                    scale: 0.05,
                    heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND, // float above terrain
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,               // pin tip at location
                    disableDepthTestDistance: Number.POSITIVE_INFINITY,         // never hidden by terrain
                    pixelOffset: new Cesium.Cartesian2(0, -10)                  // slight upward nudge
                },
                name: place.title,
                description: `
                    <h3>${place.title}</h3>
                    <p>${place.description}</p>
                    <img src="${place.image}" alt="${place.title}" />
                `
            });
        });

        // ✨ Start centered on the US
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(-98.5, 39.8, 20000000)
        });
    </script>
</body>
</html>
