    <style>
        body {

        /* ── Centered full-width map ── */
        #cesiumContainer {
            width: 80%;
            height: 525px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
            margin: 0 auto;
        }

        /* ── Toggle bar ── */
        #filter-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto 18px;
            width: 80%;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 18px;
            border-radius: 999px;
            border: 2px solid #ccc;
            background: #fff;
            color: #555;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }

        .filter-btn:hover {
            border-color: #aaa;
            background: #f5f5f5;
        }

        .filter-btn.active {
            border-color: #3a7d44;
            background: #3a7d44;
            color: #fff;
        }

        .filter-btn .btn-icon {
            font-size: 1rem;
            line-height: 1;
        }

        /* ── Modal overlay ── */
        #adventure-modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #adventure-modal-bg.open {
            display: flex;
        }

        #adventure-modal {
            background: #111;
            border-radius: 16px;
            overflow-y: auto;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 80px rgba(0,0,0,0.7);
            animation: modalIn 0.28s ease;
            scroll-behavior: auto;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.94) translateY(12px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ── Photo carousel ── */
        #modal-carousel {
            width: 100%;
            position: relative;
            background: #000;
            flex-shrink: 0;
            overflow: hidden;
            transition: height 0.35s ease;
        }

        #carousel-track {
            display: flex;
            transition: transform 0.35s ease;
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 100%;
            position: relative;
        }

        .carousel-slide img {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal-badge {
            position: absolute;
            bottom: 16px;
            left: 18px;
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .modal-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6347;
            flex-shrink: 0;
        }

            bottom: 16px;
            right: 18px;
            color: rgba(255,255,255,1);
            font-size: 0.875rem;
            z-index: 10;
            font-style: italic;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;

            padding: 0;

        #carousel-next { right: 10px; }

        #carousel-dots {

            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);

            gap: 6px;

        /* ── Filter state ── */
        let activeFilter = 'all';

        function setFilter(filter) {
            activeFilter = filter;

            // Update button styles
            document.getElementById('btn-all').classList.toggle('active', filter === 'all');
            document.getElementById('btn-golf').classList.toggle('active', filter === 'golf');
            document.getElementById('btn-climbing').classList.toggle('active', filter === 'climbing');

            // Show/hide entities
            viewer.entities.values.forEach(entity => {
                if (!entity.properties) return;
                const cat = entity.properties.category.getValue();
                entity.show = (filter === 'all') || (cat === filter);
            });

        /* ── Photo-pin canvas builder ── */
        function makePhotoPinCanvas(imgSrc, accentColor, onReady) {
            const S = 80;
            const R = 28;
            const CX = S / 2;
            const CY = R + 4;
            const TIP_H = 10;

            function draw(photoImg) {
                const canvas = document.createElement('canvas');
                canvas.width = S;
                canvas.height = CY + R + TIP_H + 4;
                const ctx = canvas.getContext('2d');
                const totalH = canvas.height;

                ctx.beginPath();
                ctx.arc(CX + 1, CY + 2, R + 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.28)';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(CX, CY, R + 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(CX - 9, CY + R + 2);
                ctx.lineTo(CX + 9, CY + R + 2);
                ctx.lineTo(CX, totalH - 2);
                ctx.closePath();
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.save();
                ctx.beginPath();
                ctx.arc(CX, CY, R, 0, Math.PI * 2);
                ctx.clip();

                if (photoImg) {
                    ctx.drawImage(photoImg, CX - R, CY - R, R * 2, R * 2);
                } else {
                    ctx.fillStyle = accentColor;
                    ctx.fillRect(CX - R, CY - R, R * 2, R * 2);
                }

                ctx.restore();
                onReady(canvas);
            }

            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => draw(img);
            img.onerror = () => draw(null);
            img.src = imgSrc;
        }

        adventures.forEach(place => {
            const isInternational = !place.badge.includes('USA') && !place.badge.includes('KY') && !place.badge.includes('WA');
            // Golf pins get a green accent; international get amber; domestic get tomato
            const pinColor = place.category === 'golf' ? '#3a7d44'
                           : isInternational          ? '#f59e0b'
                           :                            '#ff6347';
            const thumbSrc = place.photos[0].src;

            makePhotoPinCanvas(thumbSrc, pinColor, (canvas) => {
                viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(place.lon, place.lat, 0),
                    billboard: {
                        image: canvas,
                        width: canvas.width,
                        height: canvas.height,
                        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, 0),
                        disableDepthTestDistance: Number.POSITIVE_INFINITY,
                        scaleByDistance: new Cesium.NearFarScalar(1.5e6, 1.0, 2.5e7, 0.4),
                    },
                    name: place.title,
                    properties: new Cesium.PropertyBag({
                        badge:       place.badge,
                        photos:      JSON.stringify(place.photos),
                        description: place.description,
                        category:    place.category
                    })
                });
            });
        });

        /* ── Carousel state ── */
        let carouselPhotos    = [];
        let carouselIndex     = 0;
        let slideAspectRatios = [];

        const modalBg    = document.getElementById('adventure-modal-bg');
        const modalBadge = document.getElementById('modal-badge');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc  = document.getElementById('modal-desc');
        const modalClose = document.getElementById('modal-close');
        const carousel   = document.getElementById('modal-carousel');
        const track      = document.getElementById('carousel-track');
        const dotsWrap   = document.getElementById('carousel-dots');
        const prevBtn    = document.getElementById('carousel-prev');
        const nextBtn    = document.getElementById('carousel-next');
        const counter    = document.getElementById('photo-counter');

        function applyHeight(idx) {
            const ratio = slideAspectRatios[idx];
            if (ratio != null) {
                carousel.style.height = (carousel.offsetWidth * ratio) + 'px';
            }
        }

        function buildCarousel(photos) {
            carouselPhotos    = photos;
            carouselIndex     = 0;
            slideAspectRatios = new Array(photos.length).fill(null);

            track.innerHTML    = '';
            dotsWrap.innerHTML = '';

            photos.forEach((p, i) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';

                const img = document.createElement('img');
                img.src = p.src;
                img.alt = '';

                function storeRatio() {
                    if (!img.naturalWidth) return;
                    slideAspectRatios[i] = img.naturalHeight / img.naturalWidth;
                    if (i === carouselIndex) applyHeight(i);
                }

                if (img.complete && img.naturalWidth) {
                    storeRatio();
                } else {
                    img.addEventListener('load', storeRatio, { once: true });
                }

                slide.appendChild(img);

                if (p.date) {
                    const dateEl = document.createElement('span');
                    dateEl.className  = 'photo-date';
                    dateEl.textContent = p.date;
                    slide.appendChild(dateEl);
                }

                track.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => goTo(i));
                dotsWrap.appendChild(dot);
            });

            const multi = photos.length > 1;
            prevBtn.style.display  = multi ? 'flex'  : 'none';
            nextBtn.style.display  = multi ? 'flex'  : 'none';
            dotsWrap.style.display = multi ? 'flex'  : 'none';
            counter.style.display  = multi ? 'block' : 'none';

            updateCarousel();
        }

        function updateCarousel() {
            track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            dotsWrap.querySelectorAll('.carousel-dot')
                .forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
            counter.textContent = `${carouselIndex + 1} / ${carouselPhotos.length}`;
            applyHeight(carouselIndex);
        }

        function goTo(idx) {
            carouselIndex = (idx + carouselPhotos.length) % carouselPhotos.length;
            updateCarousel();
        }

        prevBtn.addEventListener('click', () => goTo(carouselIndex - 1));
        nextBtn.addEventListener('click', () => goTo(carouselIndex + 1));

        let touchStartX = 0;
        track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        track.addEventListener('touchend',   e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 40) goTo(carouselIndex + (dx < 0 ? 1 : -1));
        });

        function openModal(entity) {
            const props = entity.properties;
            modalTitle.textContent = entity.name;
            modalDesc.textContent  = props.description.getValue();
            modalBadge.textContent = props.badge.getValue();

            modalBg.classList.add('open');
            document.body.style.overflow = 'hidden';

            const photos = JSON.parse(props.photos.getValue());
            buildCarousel(photos);

            const modal    = document.getElementById('adventure-modal');
            const firstImg = track.querySelector('img');
            const scrollTop = () => { modal.scrollTop = 0; };

            if (firstImg && !firstImg.complete) {
                firstImg.addEventListener('load', scrollTop, { once: true });
            } else {
                scrollTop();
            }
        }

        function closeModal() {
            modalBg.classList.remove('open');
            document.body.style.overflow = '';
        }

        modalClose.addEventListener('click', closeModal);
        modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeModal(); return; }
            if (!modalBg.classList.contains('open')) return;
            if (e.key === 'ArrowLeft')  goTo(carouselIndex - 1);
            if (e.key === 'ArrowRight') goTo(carouselIndex + 1);
        });

        viewer.screenSpaceEventHandler.setInputAction(function (click) {
            const picked = viewer.scene.pick(click.position);
            if (Cesium.defined(picked) && Cesium.defined(picked.id) && picked.id.properties) {
                openModal(picked.id);
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(-98.5, 39.8, 20000000)
        });
    </script>
</body>
</html>
